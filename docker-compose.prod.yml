version: '3.9'

services:
  db:
    image: postgres:16-alpine
    container_name: dmario_b2b_db_prod
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${DB_NAME}
      POSTGRES_USER:     ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
    volumes:
      - pgdata_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
      target: production
    container_name: dmario_b2b_api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file: .env.prod
    environment:
      NODE_ENV:  production
      DB_HOST:   db
      DB_PORT:   5432
    ports:
      - "${PORT:-3000}:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

volumes:
  pgdata_prod:
